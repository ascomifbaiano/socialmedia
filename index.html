<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Social DICOM — IF Baiano</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #27ae60; --green-dark: #1e8449; --green-light: #d5f0e0;
            --navy: #1a252f; --bg: #f8faf9; --surface: #ffffff; --border: #e2e8e4;
            --text-main: #1a252f; --text-muted: #64748b; --sidebar-w: 260px;
            --radius-md: 12px; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-main); display: flex; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--navy); color: white; padding: 25px; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 5px; color: var(--green); }
        .sidebar p { font-size: 0.8rem; opacity: 0.7; margin-bottom: 30px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.9rem; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--green); color: white; }
        .unit-list { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .unit-item { font-size: 0.8rem; padding: 8px 15px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .unit-item:hover { opacity: 1; color: var(--green); }
        .unit-item.active { opacity: 1; color: var(--green); font-weight: bold; }

        /* Main Content */
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px; max-width: 1200px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        h1 { font-size: 1.8rem; font-weight: 700; }
        .year-select { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; }

        /* Stats & Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: var(--radius-md); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .stat-card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--navy); }
        
        .chart-container { background: var(--surface); padding: 25px; border-radius: var(--radius-md); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 30px; }

        /* Grid de Publicações */
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .post-card { background: var(--surface); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); }
        .post-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .post-content { padding: 20px; }
        .post-unit { color: var(--green); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .post-caption { font-size: 0.9rem; line-height: 1.5; color: #444; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .post-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid #f0f0f0; pt: 15px; }
        .btn-insta { color: var(--green); text-decoration: none; font-weight: 600; }

        .empty-state { text-align: center; padding: 100px 20px; color: var(--text-muted); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>IF Baiano</h2>
        <p>Radar Social DICOM</p>
        
        <nav>
            <div class="nav-item active" onclick="switchView('dashboard')">📊 Dashboard</div>
            <div class="nav-item" onclick="switchView('posts')">📱 Todas as Posts</div>
        </nav>

        <div class="unit-list">
            <div style="font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; margin-left: 15px; margin-bottom: 10px;">Unidades</div>
            <div id="unitNav"></div>
        </div>
    </aside>

    <main class="main">
        <header>
            <h1 id="viewTitle">Dashboard de Métricas</h1>
            <select class="year-select" id="yearFilter" onchange="loadData()">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
        </header>

        <!-- DASHBOARD VIEW -->
        <div id="dashboardView" class="view active">
            <div class="stats-grid">
                <div class="stat-card"><h3>Total de Publicações</h3><div class="value" id="statTotal">0</div></div>
                <div class="stat-card"><h3>No Mês Atual</h3><div class="value" id="statMonth">0</div></div>
                <div class="stat-card"><h3>Dia Mais Ativo</h3><div class="value" id="statBestDay">—</div></div>
            </div>

            <div class="chart-container">
                <h3 style="margin-bottom: 20px;">Ritmo de Publicação (Últimos 30 dias)</h3>
                <canvas id="ritmoChart" height="100"></canvas>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="chart-container">
                    <h3>Ranking por Unidade</h3>
                    <canvas id="rankingChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Distribuição Mensal</h3>
                    <canvas id="mensalChart"></canvas>
                </div>
            </div>
        </div>

        <!-- POSTS VIEW -->
        <div id="postsView" class="view">
            <div class="posts-grid" id="postsGrid">
                <!-- Posts injetados via JS -->
            </div>
        </div>
    </main>

    <script>
        const CAMPUS_LIST = ["Reitoria","Alagoinhas","Bom_Jesus_da_Lapa","Catu","Governador_Mangabeira","Guanambi","Itaberaba","Itapetinga","Santa_Inês","Senhor_do_Bonfim","Serrinha","Teixeira_de_Freitas","Uruçuca","Valença","Xique_Xique"];
        let currentUnit = 'all';
        let charts = {};

        function switchView(view, unit = 'all') {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.unit-item').forEach(v => v.classList.remove('active'));

            if (view === 'dashboard') {
                document.getElementById('dashboardView').classList.add('active');
                document.querySelector('.nav-item').classList.add('active');
                document.getElementById('viewTitle').innerText = "Dashboard de Métricas";
            } else {
                document.getElementById('postsView').classList.add('active');
                if (unit === 'all') {
                    document.querySelectorAll('.nav-item')[1].classList.add('active');
                    document.getElementById('viewTitle').innerText = "Todas as Publicações";
                } else {
                    document.getElementById(`unit-${unit}`).classList.add('active');
                    document.getElementById('viewTitle').innerText = `Publicações: ${unit.replace(/_/g, ' ')}`;
                }
            }
            currentUnit = unit;
            loadPosts();
        }

        async function init() {
            // Build unit nav
            const nav = document.getElementById('unitNav');
            CAMPUS_LIST.forEach(u => {
                const div = document.createElement('div');
                div.className = 'unit-item';
                div.id = `unit-${u}`;
                div.innerText = u.replace(/_/g, ' ');
                div.onclick = () => switchView('posts', u);
                nav.appendChild(div);
            });

            loadData();
        }

        async function loadData() {
            try {
                const resp = await fetch('metricas.json');
                const d = await resp.json();
                
                document.getElementById('statTotal').innerText = d.total_posts;
                document.getElementById('statMonth').innerText = d.total_mes_atual;
                document.getElementById('statBestDay').innerText = d.dia_mais_produtivo;

                renderCharts(d);
            } catch(e) { console.error("Erro ao carregar métricas", e); }
            loadPosts();
        }

        function renderCharts(d) {
            // Destroy existing charts to prevent overlap
            Object.values(charts).forEach(c => c.destroy());

            // Ritmo Chart
            const ritmoCtx = document.getElementById('ritmoChart').getContext('2d');
            charts.ritmo = new Chart(ritmoCtx, {
                type: 'line',
                data: {
                    labels: Object.keys(d.ritmo_publicacao),
                    datasets: [{
                        label: 'Posts',
                        data: Object.values(d.ritmo_publicacao),
                        borderColor: '#27ae60',
                        backgroundColor: 'rgba(39, 174, 96, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // Ranking Chart
            const rankCtx = document.getElementById('rankingChart').getContext('2d');
            charts.ranking = new Chart(rankCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(d.ranking),
                    datasets: [{
                        data: Object.values(d.ranking),
                        backgroundColor: '#1a252f'
                    }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            // Mensal Chart
            const mensalCtx = document.getElementById('mensalChart').getContext('2d');
            charts.mensal = new Chart(mensalCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(d.mensal),
                    datasets: [{
                        data: Object.values(d.mensal),
                        backgroundColor: ['#27ae60', '#2ecc71', '#1a252f', '#34495e', '#bdc3c7']
                    }]
                }
            });
        }

        async function loadPosts() {
            const grid = document.getElementById('postsGrid');
            const year = document.getElementById('yearFilter').value;
            grid.innerHTML = '<div class="empty-state">Carregando posts...</div>';
            
            let allPosts = [];
            const unitsToLoad = currentUnit === 'all' ? CAMPUS_LIST : [currentUnit];

            for (const unit of unitsToLoad) {
                try {
                    const resp = await fetch(`${unit}_${year}.csv`);
                    if (!resp.ok) continue;
                    const text = await resp.text();
                    const lines = text.split('\n').slice(1).filter(l => l.trim());
                    
                    lines.forEach(line => {
                        const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.replace(/^"|"$/g, ''));
                        if (c[2] !== 'placeholder') {
                            allPosts.push({
                                campus: c[0], unidad: c[1], shortcode: c[2],
                                date: c[3], caption: c[4], link: c[5], img: c[6]
                            });
                        }
                    });
                } catch(e) {}
            }

            // Ordenar por data (mais recente primeiro)
            allPosts.sort((a, b) => {
                const da = a.date.split(' ')[0].split('/').reverse().join('-');
                const db = b.date.split(' ')[0].split('/').reverse().join('-');
                return db.localeCompare(da);
            });

            if (allPosts.length === 0) {
                grid.innerHTML = '<div class="empty-state">Nenhuma publicação encontrada para este filtro.</div>';
                return;
            }

            grid.innerHTML = allPosts.map(p => `
                <div class="post-card">
                    <img class="post-img" src="${p.img}" onerror="this.src='https://placehold.co/400x300/27ae60/white?text=Instagram+Post'">
                    <div class="post-content">
                        <div class="post-unit">${p.campus.replace(/_/g, ' ')}</div>
                        <p class="post-caption">${p.caption}</p>
                        <div class="post-footer">
                            <span>📅 ${p.date.split(' ')[0]}</span>
                            <a href="${p.link}" target="_blank" class="btn-insta">Ver Post →</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
