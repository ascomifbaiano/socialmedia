name: Radar Instagram DICOM

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação para executar'
        required: true
        default: 'run'
        type: choice
        options:
          - run
          - clear_data

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clear Data (Optional)
        if: github.event.inputs.action == 'clear_data'
        run: |
          rm -rf data/
          rm -f metricas.json
          echo "Dados removidos"

      - name: Run Scraper
        if: github.event.inputs.action != 'clear_data'
        env:
          API_SRAPER_KEY: ${{ secrets.API_SRAPER_KEY }}
        run: python radar_insta.py

      - name: Commit and Push
        run: |
          git config --global user.name "Radar-DICOM-Bot"
          git config --global user.email "bot@ifbaiano.edu.br"
          git add data/ 2>/dev/null || echo ""
          git add metricas.json 2>/dev/null || echo ""
          
          # Se for clear_data, precisamos remover do git
          if [ "${{ github.event.inputs.action }}" == "clear_data" ]; then
            git rm -r data/ 2>/dev/null || echo ""
            git rm metricas.json 2>/dev/null || echo ""
            msg="Limpeza: Reset de banco de dados"
          else
            msg="Auto-update: Dashboard & Memorial (v8.5)"
          fi
          
          git commit -m "$msg" || exit 0
          git push
